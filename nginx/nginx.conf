events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate Limiting ──────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── Upstream servers ───────────────────────────────────────────────────────
    upstream backend {
        # In production: add multiple backend instances
        server backend:8000;
        # server backend2:8000;
        # server backend3:8000;
        keepalive 64;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── Main server ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # In production, redirect to HTTPS:
        # return 301 https://$host$request_uri;

        # ── WebSocket proxy ──────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;    # keep WS alive up to 24h
            proxy_send_timeout 86400;
        }

        # ── API proxy ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";   # for keepalive
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 70M;    # for media uploads
        }

        # ── Auth rate limiting ────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Health check (bypass rate limiting) ──────────────────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Frontend (React SPA) ──────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }

    # ── HTTPS configuration (uncomment for production) ─────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate /etc/ssl/certs/fullchain.pem;
    #     ssl_certificate_key /etc/ssl/private/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #
    #     # ... same location blocks as above
    # }
}