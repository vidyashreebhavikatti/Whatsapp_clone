version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# WhatsApp Clone — Docker Compose
# Includes: FastAPI backend, MongoDB replica set, Redis, MinIO (S3)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wa-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - MONGODB_URL=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0
      - MONGODB_DB_NAME=whatsapp_clone
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5173","http://localhost:80"]
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=whatsapp-clone-media
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      mongo1:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wa-network
    volumes:
      - ./backend/app:/app/app    # hot reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (Nginx serving static files) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wa-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - wa-network

  # ── MongoDB Replica Set (3 nodes for production-like setup) ──────────────────
  mongo1:
    image: mongo:7.0
    container_name: wa-mongo1
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ""
      MONGO_INITDB_ROOT_PASSWORD: ""
    command: mongod --replSet rs0 --bind_ip_all --port 27017
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mongo1-data:/data/db
    networks:
      - wa-network

  mongo2:
    image: mongo:7.0
    container_name: wa-mongo2
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --port 27017
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mongo2-data:/data/db
    networks:
      - wa-network

  mongo3:
    image: mongo:7.0
    container_name: wa-mongo3
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --port 27017
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mongo3-data:/data/db
    networks:
      - wa-network

  # Initializes the MongoDB replica set
  mongo-init:
    image: mongo:7.0
    container_name: wa-mongo-init
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    networks:
      - wa-network
    command: |
      bash -c "
        mongosh --host mongo1:27017 <<EOF
          rs.initiate({
            _id: 'rs0',
            members: [
              { _id: 0, host: 'mongo1:27017', priority: 2 },
              { _id: 1, host: 'mongo2:27017', priority: 1 },
              { _id: 2, host: 'mongo3:27017', priority: 1 }
            ]
          });
          rs.status();
      EOF
      "
    restart: on-failure

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: wa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - wa-network

  # ── MinIO (S3-compatible local object storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: wa-minio
    restart: unless-stopped
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - wa-network

  # Creates the default bucket in MinIO
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - wa-network
    entrypoint: |
      sh -c "
        sleep 5
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/whatsapp-clone-media --ignore-existing
        mc anonymous set public local/whatsapp-clone-media
      "

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: wa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - wa-network


# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:
  redis-data:
  minio-data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  wa-network:
    driver: bridge